name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/docker hub_username | DOCKER_HUB_USERNAME ;
            secret/data/docker hub_token    | DOCKER_HUB_TOKEN

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/backend:latest
            ${{ env.DOCKER_HUB_USERNAME }}/backend:${{ github.ref_name }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: github-actions
          secrets: |
            secret/data/docker hub_username | DOCKER_HUB_USERNAME ;
            secret/data/docker hub_token    | DOCKER_HUB_TOKEN

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/frontend:latest
            ${{ env.DOCKER_HUB_USERNAME }}/frontend:${{ github.ref_name }}
