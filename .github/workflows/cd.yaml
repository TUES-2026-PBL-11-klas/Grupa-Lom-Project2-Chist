name: CD - Deploy to ACR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_DOCKERFILE_PATH: ./backend
  FRONTEND_DOCKERFILE_PATH: ./frontend

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    name: Build & Push Spring Boot
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get secrets from HCP Vault
        uses: hashicorp/hcp-auth-action@v0
        with:
          client_id: ${{ secrets.HCP_CLIENT_ID }}
          client_secret: ${{ secrets.HCP_CLIENT_SECRET }}

      - name: Fetch ACR secrets from HCP Vault
        uses: hashicorp/hcp-vault-secrets-action@v0.1.0
        with:
          app_name: ${{ vars.HCP_APP_NAME }}
        env:
          HCP_PROJECT_ID: ${{ secrets.HCP_PROJECT_ID }}
          HCP_ORGANIZATION_ID: ${{ secrets.HCP_ORGANIZATION_ID }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DOCKERFILE_PATH }}
          file: ${{ env.BACKEND_DOCKERFILE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/hacktues12-backend:latest
            ${{ env.ACR_REGISTRY }}/hacktues12-backend:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build & Push React Router
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get secrets from HCP Vault
        uses: hashicorp/hcp-auth-action@v0
        with:
          client_id: ${{ secrets.HCP_CLIENT_ID }}
          client_secret: ${{ secrets.HCP_CLIENT_SECRET }}

      - name: Fetch ACR secrets from HCP Vault
        uses: hashicorp/hcp-vault-secrets-action@v0.1.0
        with:
          app_name: ${{ vars.HCP_APP_NAME }}
        env:
          HCP_PROJECT_ID: ${{ secrets.HCP_PROJECT_ID }}
          HCP_ORGANIZATION_ID: ${{ secrets.HCP_ORGANIZATION_ID }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DOCKERFILE_PATH }}
          file: ${{ env.FRONTEND_DOCKERFILE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/hacktues12-frontend:latest
            ${{ env.ACR_REGISTRY }}/hacktues12-frontend:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
