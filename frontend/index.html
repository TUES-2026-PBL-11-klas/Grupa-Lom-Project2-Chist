<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050e08" />
    <meta
      name="description"
      content="Clean&Win — Докладвай замърсявания, почиствай и печели точки. Платформа за по-чиста градска среда."
    />
    <meta property="og:title" content="Clean&Win" />
    <meta
      property="og:description"
      content="Геймифицирана платформа за почистване на градската среда"
    />
    <title>Clean&Win — По-чиста София</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset & Base ───────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green-bright: #4ade80;
        --green-mid: #22c55e;
        --green-deep: #16a34a;
        --green-dim: rgba(74, 222, 128, 0.12);
        --green-border: rgba(74, 222, 128, 0.22);
        --green-glow: rgba(74, 222, 128, 0.35);

        --amber: #f5c518;
        --amber-dim: rgba(245, 197, 24, 0.15);
        --red-alert: #ff3b3b;
        --blue-info: #60a5fa;

        --bg-void: #050e08;
        --bg-card: rgba(10, 28, 18, 0.8);
        --bg-card-hover: rgba(14, 38, 24, 0.9);
        --bg-glass: rgba(10, 28, 18, 0.6);

        --text-primary: #e8f5e9;
        --text-secondary: rgba(232, 245, 233, 0.55);
        --text-muted: rgba(74, 222, 128, 0.45);

        --font-display: "Bebas Neue", sans-serif;
        --font-mono: "Space Mono", monospace;
        --font-body: "DM Sans", sans-serif;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;

        --nav-height: 64px;
        --header-height: 60px;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        background-color: var(--bg-void);
        color: var(--text-primary);
        font-family: var(--font-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* ── Scrollbar ──────────────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--green-border);
        border-radius: 2px;
      }

      /* ── Selection ──────────────────────────────────────────────────── */
      ::selection {
        background: var(--green-dim);
        color: var(--green-bright);
      }

      /* ── Focus visible ──────────────────────────────────────────────── */
      :focus-visible {
        outline: 2px solid var(--green-bright);
        outline-offset: 2px;
      }

      /* ── Global keyframes ───────────────────────────────────────────── */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes pulse-ring {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.6);
          opacity: 0;
        }
      }
      @keyframes scanline {
        0% {
          transform: translateY(-100%);
        }
        100% {
          transform: translateY(100vh);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      @keyframes floatY {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      /* ── Utility classes ────────────────────────────────────────────── */
      .mono {
        font-family: var(--font-mono);
      }
      .display {
        font-family: var(--font-display);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--green-border);
        border-radius: var(--radius-lg);
        transition:
          border-color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        border-color: rgba(74, 222, 128, 0.4);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(74, 222, 128, 0.08);
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--green-bright),
          var(--green-deep)
        );
        color: #050e08;
        font-family: var(--font-mono);
        font-weight: 700;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition:
          box-shadow 0.2s,
          transform 0.15s;
        letter-spacing: 1px;
      }
      .btn-primary:hover {
        box-shadow: 0 0 24px var(--green-glow);
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font-mono);
        border: 1px solid var(--green-border);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .btn-ghost:hover {
        border-color: var(--green-bright);
        color: var(--green-bright);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 20px;
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.5px;
      }

      .label-caps {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .glow-text {
        text-shadow: 0 0 20px var(--green-glow);
      }

      /* ── Scanline overlay (decorative) ─────────────────────────────── */
      .scanline-overlay {
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
      }
      .scanline-overlay::after {
        content: "";
        display: block;
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          transparent,
          rgba(74, 222, 128, 0.04),
          transparent
        );
        animation: scanline 6s linear infinite;
      }

      /* ── App mount ──────────────────────────────────────────────────── */
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="scanline-overlay" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
